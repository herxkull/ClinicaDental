<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Doctor | DentalSaaS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
        }
        .gradient-text {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .premium-shadow {
            box-shadow: 0 20px 40px -15px rgba(37, 99, 235, 0.12);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between bg-slate-50">

    <!-- Header Navigation -->
    <nav class="w-full bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100/80">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{% url 'home_publico' %}" class="flex items-center gap-2 hover:opacity-80 transition-all">
                <i class="fas fa-tooth text-blue-600 text-2xl animate-pulse"></i>
                <span class="text-xl font-extrabold tracking-tight text-slate-900">DentalSaaS</span>
            </a>
            <div>
                <a href="{% url 'home_publico' %}" class="text-sm font-semibold text-slate-500 hover:text-blue-600 transition-all flex items-center gap-1">
                    <i class="fas fa-arrow-left"></i> Volver al Inicio
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Section -->
    <main class="flex-1 flex items-center justify-center py-16 px-6">
        <div class="max-w-md w-full bg-white p-8 md:p-10 rounded-3xl premium-shadow border border-slate-100 transition-all">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl shadow-inner shadow-blue-100">
                    <i class="fas fa-user-md"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">Acceso Doctor</h1>
                <p class="text-slate-500 text-sm leading-relaxed">
                    Ingresa a tu clínica de forma rápida. Elige tu método preferido.
                </p>
            </div>

            <!-- Botón Google -->
            <div class="mb-6">
                <a href="{% url 'google_login' %}" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 hover:border-blue-500 hover:bg-blue-50/30 text-slate-700 font-bold py-3.5 px-6 rounded-2xl shadow-sm transition-all">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" width="100%" height="100%">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span>Ingresar con Google</span>
                </a>
            </div>

            <div class="relative flex py-3 items-center mb-6">
                <div class="flex-grow border-t border-slate-100"></div>
                <span class="flex-shrink mx-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">O por Correo</span>
                <div class="flex-grow border-t border-slate-100"></div>
            </div>

            {% if error %}
            <div class="mb-5 p-4 bg-red-50/50 border border-red-100 rounded-2xl text-sm text-red-600 flex items-start gap-2.5">
                <i class="fas fa-exclamation-circle mt-0.5"></i>
                <p class="leading-relaxed">{{ error }}</p>
            </div>
            {% endif %}

            <!-- Formulario de búsqueda por correo -->
            <form method="POST">
                {% csrf_token %}
                <div class="mb-5">
                    <label for="email" class="block text-xs font-bold text-slate-500 tracking-wider uppercase mb-2">Correo de la Clínica</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="email" id="email" name="email" required placeholder="ejemplo@miclinica.com" 
                               class="w-full bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 rounded-2xl pl-12 pr-4 py-3.5 text-sm text-slate-900 placeholder:text-slate-400 outline-none transition-all">
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-4 px-6 rounded-2xl shadow-lg shadow-blue-100 hover:shadow-xl hover:shadow-blue-200 transition-all flex items-center justify-center gap-2">
                    <span>Acceder a Mi Clínica</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-8 bg-white border-t border-slate-100">
        <div class="max-w-7xl mx-auto px-6 text-center text-slate-400 text-xs">
            <p>&copy; 2026 DentalSaaS. Todos los derechos reservados.</p>
        </div>
    </footer>

</body>
</html>
