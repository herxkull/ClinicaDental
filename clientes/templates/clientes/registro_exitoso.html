<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Éxito! Clínica Creada | DentalSaaS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #e9ecef; }
        .success-card { max-width: 600px; margin: 80px auto; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .icon-check { font-size: 60px; color: #28a745; margin-bottom: 20px; }
        .access-link { font-size: 1.2rem; font-weight: bold; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-card">
            <div class="icon-check">✔</div>
            <h1 class="mb-4">¡Felicidades, {{ clinica.nombre_clinica }}!</h1>
            <p class="lead">Tu sistema dental ya está listo y configurado.</p>
            <hr class="my-4">
            <p>Puedes acceder a tu panel de control aquí:</p>
            <p class="access-link">
                <a href="{{ url_acceso }}" class="btn btn-success btn-lg">{{ url_acceso }}</a>
            </p>
            <div class="alert alert-info mt-4">
                <strong>Importante:</strong> Utiliza el correo electrónico y la contraseña que ingresaste en el registro para iniciar sesión.
            </div>
        </div>
    </div>
</body>
</html>
