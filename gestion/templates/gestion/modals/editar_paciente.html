<div class="bg-gray-900 px-8 py-6 text-white flex justify-between items-center">
    <div>
        <h3 class="text-xl font-black uppercase tracking-widest">Actualizar Expediente</h3>
        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">Modificación rápida de datos del paciente</p>
    </div>
    <button type="button" class="text-white/50 hover:text-white" data-bs-dismiss="modal">
        <i class="fas fa-times text-xl"></i>
    </button>
</div>

<form id="formEditarPaciente" class="p-8">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div>
            <label class="block text-[10px] font-black text-gray-400 uppercase mb-2">Nombre Completo</label>
            <input type="text" name="nombre" value="{{ paciente.nombre }}" class="w-full bg-gray-50 border-0 rounded-2xl p-4 font-bold text-gray-700 focus:ring-2 focus:ring-blue-500 transition-all">
        </div>
        <div>
            <label class="block text-[10px] font-black text-gray-400 uppercase mb-2">Teléfono / WhatsApp</label>
            <input type="text" name="telefono" value="{{ paciente.telefono }}" class="w-full bg-gray-50 border-0 rounded-2xl p-4 font-bold text-gray-700 focus:ring-2 focus:ring-blue-500 transition-all">
        </div>
    </div>

    <div class="mb-8">
        <label class="block text-[10px] font-black text-gray-400 uppercase mb-2">Alergias y Contraindicaciones</label>
        <textarea name="alergias" rows="2" class="w-full bg-red-50 border-0 rounded-2xl p-4 font-bold text-red-700 focus:ring-2 focus:ring-red-500 transition-all">{{ paciente.alergias }}</textarea>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-10">
        <label class="flex items-center gap-3 p-4 bg-gray-50 rounded-2xl cursor-pointer hover:bg-gray-100 transition-all border border-transparent has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
            <input type="checkbox" name="diabetes" {% if paciente.diabetes %}checked{% endif %} class="w-5 h-5 rounded-lg text-blue-600 focus:ring-blue-500 border-gray-300">
            <span class="text-sm font-black text-gray-700 uppercase">Diabetes</span>
        </label>
        <label class="flex items-center gap-3 p-4 bg-gray-50 rounded-2xl cursor-pointer hover:bg-gray-100 transition-all border border-transparent has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
            <input type="checkbox" name="hipertension" {% if paciente.hipertension %}checked{% endif %} class="w-5 h-5 rounded-lg text-blue-600 focus:ring-blue-500 border-gray-300">
            <span class="text-sm font-black text-gray-700 uppercase">Hipertensión</span>
        </label>
    </div>

    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-3xl shadow-xl shadow-blue-500/20 transition-all flex items-center justify-center gap-3 text-lg">
        <i class="fas fa-save"></i> GUARDAR CAMBIOS
    </button>
</form>

<script>
    document.getElementById('formEditarPaciente').onsubmit = async function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        const response = await fetch('{% url "editar_paciente_rapido" paciente.pk %}', {
            method: 'POST',
            body: formData,
            headers: { 'X-CSRFToken': '{{ csrf_token }}' }
        });
        if (response.ok) {
            Swal.fire({
                icon: 'success',
                title: 'Paciente Actualizado',
                text: 'Los cambios se han guardado correctamente.',
                timer: 1500,
                showConfirmButton: false
            }).then(() => location.reload());
        }
    };
</script>
