<!-- Modal de Checkout Profesional -->
<div class="modal fade" id="modalCheckout" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-[2.5rem] shadow-2xl overflow-hidden">
            <div class="modal-header border-0 bg-gray-900 p-8 text-white">
                <div>
                    <h5 class="modal-title font-black text-2xl" id="checkoutTitle">Registrar Pago y Finalizar</h5>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mt-1" id="checkoutSubtitle">Paciente: -</p>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-8 bg-white">
                <form id="formCheckout">
                    <input type="hidden" id="checkout_cita_id">
                    
                    <!-- Resumen del Tratamiento -->
                    <div class="bg-gray-50 rounded-3xl p-6 mb-8 flex justify-between items-center border border-gray-100">
                        <div>
                            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Tratamiento Vinculado</p>
                            <p class="text-sm font-black text-gray-900" id="checkout_tratamiento_nombre">-</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Monto Sugerido</p>
                            <p class="text-xl font-black text-blue-600" id="checkout_monto_sugerido">$0.00</p>
                        </div>
                    </div>

                    <!-- Monto a Pagar -->
                    <div class="mb-8">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Monto Final a Cobrar</label>
                        <div class="relative">
                            <span class="absolute left-6 top-1/2 -translate-y-1/2 text-gray-400 font-black">$</span>
                            <input type="number" id="checkout_monto" step="0.01" class="w-full bg-gray-50 border-0 rounded-3xl py-5 pl-10 pr-6 text-xl font-black text-gray-900 focus:ring-4 focus:ring-blue-500/10 transition-all" placeholder="0.00">
                        </div>
                    </div>

                    <!-- Método de Pago Selector -->
                    <div class="mb-8">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 block">Método de Pago</label>
                        <div class="grid grid-cols-3 gap-3">
                            <label class="cursor-pointer group">
                                <input type="radio" name="metodo_pago" value="EFECTIVO" class="peer hidden" checked>
                                <div class="bg-gray-50 border-2 border-transparent peer-checked:border-blue-500 peer-checked:bg-blue-50 rounded-2xl p-4 text-center transition-all group-hover:bg-gray-100">
                                    <span class="text-2xl mb-1 block">💵</span>
                                    <span class="text-[10px] font-black text-gray-500 peer-checked:text-blue-600">EFECTIVO</span>
                                </div>
                            </label>
                            <label class="cursor-pointer group">
                                <input type="radio" name="metodo_pago" value="TRANSFERENCIA" class="peer hidden">
                                <div class="bg-gray-50 border-2 border-transparent peer-checked:border-blue-500 peer-checked:bg-blue-50 rounded-2xl p-4 text-center transition-all group-hover:bg-gray-100">
                                    <span class="text-2xl mb-1 block">🏦</span>
                                    <span class="text-[10px] font-black text-gray-500 peer-checked:text-blue-600">TRANSF.</span>
                                </div>
                            </label>
                            <label class="cursor-pointer group">
                                <input type="radio" name="metodo_pago" value="TARJETA" class="peer hidden">
                                <div class="bg-gray-50 border-2 border-transparent peer-checked:border-blue-500 peer-checked:bg-blue-50 rounded-2xl p-4 text-center transition-all group-hover:bg-gray-100">
                                    <span class="text-2xl mb-1 block">💳</span>
                                    <span class="text-[10px] font-black text-gray-500 peer-checked:text-blue-600">TARJETA</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Notas -->
                    <div class="mb-8">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Nota / Referencia (Opcional)</label>
                        <input type="text" id="checkout_notas" class="w-full bg-gray-50 border-0 rounded-2xl py-4 px-6 text-sm font-bold text-gray-700 focus:ring-4 focus:ring-blue-500/10 transition-all" placeholder="Ej: Referencia Bancaria #123...">
                    </div>

                    <!-- Botón de Acción -->
                    <button type="submit" id="btnConfirmarCheckout" class="w-full bg-green-500 hover:bg-green-600 text-white font-black py-5 rounded-3xl shadow-xl shadow-green-500/20 transition-all flex items-center justify-center gap-3 text-lg">
                        <i class="fas fa-check-circle"></i> CONFIRMAR Y FINALIZAR
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function abrirCheckout(citaId, pacienteNombre, monto, tratamientoNombre) {
    document.getElementById('checkout_cita_id').value = citaId;
    document.getElementById('checkoutSubtitle').innerText = `Paciente: ${pacienteNombre}`;
    document.getElementById('checkout_tratamiento_nombre').innerText = tratamientoNombre;
    document.getElementById('checkout_monto_sugerido').innerText = `$${parseFloat(monto).toFixed(2)}`;
    document.getElementById('checkout_monto').value = parseFloat(monto).toFixed(2);
    
    const modal = new bootstrap.Modal(document.getElementById('modalCheckout'));
    modal.show();
}

document.getElementById('formCheckout').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('btnConfirmarCheckout');
    const originalText = btn.innerHTML;
    const citaId = document.getElementById('checkout_cita_id').value;
    
    const data = {
        monto: document.getElementById('checkout_monto').value,
        metodo: document.querySelector('input[name="metodo_pago"]:checked').value,
        notas: document.getElementById('checkout_notas').value
    };

    try {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROCESANDO...';

        const response = await fetch(`/cita/completar/${citaId}/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.status === 'ok') {
            bootstrap.Modal.getInstance(document.getElementById('modalCheckout')).hide();
            
            // Notificación Exitosa
            Swal.fire({
                title: '¡Operación Exitosa!',
                text: result.message,
                icon: 'success',
                confirmButtonText: 'Genial',
                confirmButtonColor: '#10b981',
                timer: 2000,
                timerProgressBar: true,
                customClass: {
                    popup: 'rounded-[2rem]',
                    confirmButton: 'rounded-2xl font-black px-8 py-3'
                }
            }).then(() => {
                // Actualizar KPIs y Gráficos vía AJAX
                actualizarKpisDashboard();
                
                // Actualizar la fila de la cita visualmente
                const row = document.getElementById(`cita-row-${citaId}`);
                if (row) {
                    const badge = row.querySelector('.rounded-full');
                    const btn = row.querySelector('button');
                    if (badge) {
                        badge.innerText = 'COMPLETADA';
                        badge.className = 'px-2 py-0.5 rounded-full text-[8px] font-black uppercase text-white bg-green-500';
                    }
                    if (btn) {
                        btn.outerHTML = '<i class="fas fa-check-circle text-green-500 text-lg"></i>';
                    }
                }
            });
        } else {
            throw new Error(result.message || 'Error desconocido');
        }
    } catch (error) {
        Swal.fire({
            title: 'Error',
            text: error.message,
            icon: 'error',
            confirmButtonColor: '#ef4444',
            customClass: { popup: 'rounded-[2rem]' }
        });
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
});

// Función para actualizar KPIs sin recargar (opcional, si queremos UX premium total)
async function actualizarKpisDashboard() {
    try {
        const periodo = document.getElementById('periodo-selector').value;
        const response = await fetch(`/api/dashboard/stats/?periodo=${periodo}`);
        const data = await response.json();

        // Actualizar KPIs
        const kpiIngresos = document.getElementById('kpi-ingresos');
        if (kpiIngresos) kpiIngresos.innerText = `$${data.ingresos}`;
        
        // Recargar gráficos
        const dataContainer = document.getElementById('dashboard-data');
        if (dataContainer) {
            dataContainer.dataset.tratamientosLabels = JSON.stringify(data.chart_labels);
            dataContainer.dataset.tratamientosSeries = JSON.stringify(data.chart_series);
            if (window.renderCharts) window.renderCharts();
        }
    } catch (e) {
        console.error("Error actualizando KPIs:", e);
    }
}
</script>
