<div class="modal-header bg-primary text-white">
    <h5 class="modal-title">
        <i class="fas fa-user-edit me-2"></i>{{ titulo }}
    </h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<!-- 1. Ajustamos el Action para que funcione tanto al CREAR como al EDITAR -->
<form id="formEditarPaciente"
      action="{% if paciente %}{% url 'modal_paciente_editar' paciente.id %}{% else %}/paciente/modal/{% endif %}"
      method="POST">

    {% csrf_token %}

    <div class="modal-body">
        {% if form.errors %}
            <div class="alert alert-danger py-2 shadow-sm">
                <p class="small fw-bold mb-1"><i class="fas fa-exclamation-circle me-1"></i> Por favor corrige los errores:</p>
            </div>
        {% endif %}

        <div class="row">
            {% for field in form %}
            <div class="col-md-6 mb-3">
                <label class="form-label small fw-bold text-muted">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger x-small mt-1">{{ field.errors.0 }}</div>
                {% endif %}
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="modal-footer bg-light border-0">
        <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-primary px-4 fw-bold">
            <i class="fas fa-save me-1"></i> Guardar Cambios
        </button>
    </div>
</form>
