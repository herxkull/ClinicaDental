{% extends 'gestion/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Catálogo de Tratamientos</h2>
    <a href="{% url 'nuevo_tratamiento' %}" class="btn btn-success">+ Agregar Tratamiento</a>
</div>

<div class="card shadow-sm border-0">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Nombre del Tratamiento</th>
                    <th>Costo Base ($)</th>
                    <th class="text-end">Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for t in tratamientos %}
                <tr>
                    <td class="align-middle">{{ t.nombre }}</td>
                    <td class="align-middle fw-bold text-success">${{ t.costo_base }}</td>
                    <td class="text-end">
                        <a href="{% url 'editar_tratamiento' t.pk %}" class="btn btn-sm btn-outline-primary">✏️ Editar</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center p-4 text-muted">No hay tratamientos registrados aún.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
