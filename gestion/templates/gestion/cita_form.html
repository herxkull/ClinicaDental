{% extends 'gestion/base.html' %}

{% block content %}
<div class="card shadow-sm border-0 p-4 mx-auto" style="max-width: 600px;">
    <h3>Agendar Nueva Cita</h3>
    <hr>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="mt-3">
            <button type="submit" class="btn btn-primary w-100">Confirmar Cita</button>
            <a href="{% url 'lista_citas' %}" class="btn btn-link w-100 mt-2 text-secondary">Volver a la agenda</a>
        </div>
    </form>
</div>

<style>
    /* Pequeño ajuste para que los campos de Django se vean como Bootstrap */
    p label { display: block; font-weight: bold; margin-bottom: 5px; }
    p input, p select, p textarea { 
        width: 100%; 
        padding: 8px; 
        border: 1px solid #dee2e6; 
        border-radius: 5px;
    }
</style>
{% endblock %}
