{% if color == 'green' %}
    <span class="px-3 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest bg-green-500/10 text-green-500 border border-green-500/20">
{% elif color == 'blue' %}
    <span class="px-3 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest bg-blue-500/10 text-blue-500 border border-blue-500/20">
{% elif color == 'orange' %}
    <span class="px-3 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest bg-orange-500/10 text-orange-500 border border-orange-500/20">
{% elif color == 'red' %}
    <span class="px-3 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest bg-red-500/10 text-red-500 border border-red-500/20">
{% else %}
    <span class="px-3 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest bg-slate-500/10 text-slate-500 border border-slate-500/20">
{% endif %}
    {{ label }}
</span>
