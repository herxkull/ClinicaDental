<div class="sfs-card p-6 transition-all hover:scale-[1.02] hover:shadow-2xl relative overflow-hidden group">
    <div class="flex items-center justify-between mb-5 relative z-10">
        <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-xl shadow-lg transition-transform group-hover:rotate-12" 
             style="background-color: var(--color-bg-main); color: var(--color-primary); border: 1px solid var(--color-border);">
            <i class="fas fa-{{ icon }}"></i>
        </div>
        {% if trend %}
        <span class="text-[10px] font-black px-3 py-1.5 rounded-full flex items-center gap-1.5 
                    {% if trend > 0 %}bg-green-500/10 text-green-500{% else %}bg-red-500/10 text-red-500{% endif %}">
            {{ trend|floatformat:1 }}% <i class="fas fa-arrow-{% if trend > 0 %}up{% else %}down{% endif %} text-[8px]"></i>
        </span>
        {% endif %}
    </div>
    
    <div class="relative z-10">
        <h3 class="text-text-muted text-[10px] font-black uppercase tracking-[0.2em] mb-2">{{ title }}</h3>
        <p class="text-3xl font-black text-text-base tracking-tighter">{{ value }}</p>
    </div>
    
    <!-- Decorative background element -->
    <div class="absolute -bottom-6 -right-6 w-24 h-24 bg-brand-primary/5 rounded-full blur-2xl group-hover:bg-brand-primary/10 transition-colors"></div>
</div>
