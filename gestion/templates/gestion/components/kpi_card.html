<div class="bg-white p-6 rounded-3xl shadow-xl shadow-gray-200/50 border border-gray-100 transition-all hover:translate-y-[-4px]">
    <div class="flex items-center justify-between mb-4">
        <div class="w-12 h-12 bg-{{ color }}-50 text-{{ color }}-600 rounded-2xl flex items-center justify-center text-xl">
            <i class="fas fa-{{ icon }}"></i>
        </div>
        {% if trend %}
        <span class="text-xs font-bold {% if trend > 0 %}text-green-500{% else %}text-red-500{% endif %} bg-opacity-10 px-2 py-1 rounded-lg">
            {{ trend|floatformat:1 }}% <i class="fas fa-arrow-{% if trend > 0 %}up{% else %}down{% endif %} ml-1"></i>
        </span>
        {% endif %}
    </div>
    <h3 class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-1">{{ title }}</h3>
    <p class="text-2xl font-black text-gray-900">{{ value }}</p>
</div>
