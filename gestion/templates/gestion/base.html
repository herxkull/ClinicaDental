{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hersan Dental{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome (Asegúrate de tenerlo para los iconos de las cards) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- TU NUEVO ARCHIVO CSS EXTERNO -->
    <link rel="stylesheet" href="{% static 'gestion/css/style.css' %}">

    {% block extra_css %}{% endblock %}
    <style>
        .sidebar {
            min-height: 100vh;
            background-color: #212529;
            color: white;
        }
        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            padding: 10px;
            display: block;
            border-radius: 5px;
        }
        .sidebar a:hover {
            background-color: #343a40;
            color: white;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">

            {% if user.is_authenticated %}
            <!-- MENÚ LATERAL (SOLO UNO) -->
            <nav class="col-md-2 d-none d-md-block sidebar p-3 shadow">
                <h4 class="text-center mb-4 mt-2">🦷 Hersan Dental</h4>
                <ul class="nav flex-column">
                    <li class="nav-item mb-2">
                        <a class="nav-link" href="{% url 'dashboard' %}">🏠 Dashboard</a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link" href="{% url 'lista_pacientes' %}">👥 Pacientes</a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link" href="{% url 'calendario' %}">📅 Agenda Visual</a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link" href="{% url 'lista_tratamientos' %}">💉 Tratamientos</a>
                    </li>
                </ul>

                <hr class="text-secondary mt-5">
                <!-- BOTÓN DE CERRAR SESIÓN -->
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger w-100">🚪 Cerrar Sesión</button>
                </form>
            </nav>
            {% endif %}

            <!-- CONTENIDO PRINCIPAL -->
            <main class="{% if user.is_authenticated %}col-md-10 ms-sm-auto{% else %}col-12{% endif %} p-4" style="min-height: 100vh;">
                {% block content %}
                <!-- Aquí es donde Django inyecta tus otras pantallas -->
                {% endblock %}
            </main>

        </div>
    </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
