{% extends 'gestion/base.html' %}

{% block content %}
<div class="card shadow-sm border-0 p-4 mx-auto" style="max-width: 600px;">
    <h3>📝 Nueva Receta Médica</h3>
    <p class="text-muted">Paciente: <strong>{{ paciente.nombre }}</strong></p>
    <hr>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-bold">Medicamentos y Dosis (Rp.)</label>
            {{ form.prescripcion }}
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold">Notas Adicionales</label>
            {{ form.notas_adicionales }}
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-2">Generar e Imprimir Receta</button>
        <a href="{% url 'detalle_paciente' paciente.pk %}" class="btn btn-light w-100">Cancelar</a>
    </form>
</div>
{% endblock %}
