<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Clínica Dental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">🦷 Sistema Dental</a>
        </div>
    </nav>

    <div class="container">
        <div class="row text-center">
            <!-- Tarjeta Pacientes -->
            <div class="col-md-6 mb-4">
                <div class="card border-0 shadow-sm p-3">
                    <h3>👥 {{ total_pacientes }}</h3>
                    <p class="text-muted">Pacientes Totales</p>
                </div>
            </div>
            <!-- Tarjeta Citas -->
            <div class="col-md-6 mb-4">
                <div class="card border-0 shadow-sm p-3 text-white bg-success">
                    <h3>📅 {{ citas_hoy }}</h3>
                    <p>Citas para Hoy</p>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mt-4">
            <div class="card-header bg-white">
                <h5 class="mb-0">Últimos Pacientes Registrados</h5>
            </div>
            <ul class="list-group list-group-flush">
                {% for paciente in ultimos_pacientes %}
                <li class="list-group-group-item p-3 border-bottom">
                    {{ paciente.nombre }} - <span class="text-muted">{{ paciente.telefono }}</span>
                </li>
                {% empty %}
                <li class="list-group-item">No hay pacientes registrados aún.</li>
                {% endfor %}
            </ul>
        </div>
    </div>

</body>
</html>
