{% extends 'gestion/base.html' %}

{% block title %}Dashboard - Clínica{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Resumen General</h1>
    <a href="{% url 'nuevo_paciente' %}" class="btn btn-primary">+ Nuevo Paciente</a>
</div>

<div class="row text-center">
    <div class="col-md-4">
        <div class="card shadow-sm p-3 border-0">
            <h2 class="text-primary">{{ total_pacientes }}</h2>
            <p class="mb-0">Pacientes Registrados</p>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card shadow-sm p-3 border-0 bg-success text-white">
            <h2 class="mb-0">{{ citas_hoy }}</h2>
            <p class="mb-0">Citas para Hoy</p>
        </div>
    </div>
</div>
{% endblock %}
