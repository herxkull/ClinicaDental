{% extends 'gestion/base.html' %}

{% block content %}
<div class="card shadow-sm border-0 p-4 mx-auto" style="max-width: 500px;">
    <h3>{{ titulo }}</h3>
    <hr>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label text-muted fw-bold">Nombre del Servicio</label>
            {{ form.nombre }}
        </div>
        <div class="mb-3">
            <label class="form-label text-muted fw-bold">Costo Base ($)</label>
            <div class="input-group">
                <span class="input-group-text">$</span>
                {{ form.costo_base }}
            </div>
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-primary w-100 mb-2">Guardar Tratamiento</button>
            <a href="{% url 'lista_tratamientos' %}" class="btn btn-light w-100">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
