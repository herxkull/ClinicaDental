{% extends 'gestion/base.html' %}

{% block title %}Agenda Dental - Hersan Dental{% endblock %}

{% block content %}
<div class="card shadow-sm border-0 p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📅 Agenda de Citas</h2>
        <a href="{% url 'nueva_cita' %}" class="btn btn-primary">+ Agendar Nueva</a>
    </div>

    <div id='calendar' class="bg-white p-2"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth', // Vista inicial: Mes
      locale: 'es',               // Idioma: Español
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,timeGridDay' // Botones para cambiar vista
      },
      buttonText: {
        today: 'Hoy',
        month: 'Mes',
        week: 'Semana',
        day: 'Día'
      },
      // AQUÍ ES DONDE CONECTAMOS CON TU BASE DE DATOS
      events: '/api/citas/',
      
      eventClick: function(info) {
        if (info.event.url) {
          // Evita que el navegador abra el link antes de procesar
          // (Aunque en este caso queremos que vaya al detalle del paciente)
          return true;
        }
      }
    });
    calendar.render();
  });
</script>

<style>
    /* Ajuste para que el calendario no se vea gigante */
    .fc { max-height: 80vh; }
    .fc-event { cursor: pointer; }
</style>
{% endblock %}
