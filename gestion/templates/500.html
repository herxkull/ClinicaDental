<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error en el sistema | Prismo Dental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full text-center">
        <div class="mb-8">
            <div class="w-24 h-24 bg-red-50 text-red-500 rounded-3xl flex items-center justify-center mx-auto text-4xl shadow-inner">
                <i class="fas fa-tools"></i>
            </div>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 mb-4">Mantenimiento de Emergencia</h2>
        <p class="text-gray-500 mb-8">Algo no salió bien en nuestros servidores. Ya hemos notificado a nuestro equipo técnico para que lo repare de inmediato.</p>
        <div class="space-y-4">
            <button onclick="window.location.reload()" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold hover:bg-black transition-all">
                Intentar de nuevo
            </button>
            <a href="/" class="block text-sm font-medium text-blue-600 hover:underline">Ir al Dashboard principal</a>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
