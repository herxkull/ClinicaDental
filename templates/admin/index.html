{% extends "admin/index.html" %}
{% load i18n %}

{% block content %}
<script src="https://cdn.tailwindcss.com"></script>

<div class="mb-8 mt-2">
    <!-- Fila de KPIs -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        {% for kpi in kpis %}
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-4 hover:shadow-md transition-shadow">
            <div class="p-3 rounded-lg bg-gray-50 text-2xl">
                {{ kpi.icon }}
            </div>
            <div>
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">{{ kpi.label }}</p>
                <p class="text-2xl font-bold {{ kpi.color }}">{{ kpi.value }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

{{ block.super }}

<style>
    /* Ajustes para integrar con el admin de Django */
    #content { background: #f9fafb !important; }
    .module { border-radius: 12px !important; border: 1px solid #f3f4f6 !important; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05) !important; }
    #content-main { display: flex; flex-direction: column; }
    .dashboard #content { padding: 20px 40px !important; }
    caption { background: #6366f1 !important; border-radius: 12px 12px 0 0 !important; font-weight: 800 !important; text-transform: uppercase !important; letter-spacing: 0.05em !important; }
    .module th, .module td { border-color: #f3f4f6 !important; }
</style>
{% endblock %}
